name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        elixir: ["1.18"]
        otp: ["27"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install z3
        run: sudo apt-get install -y z3

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      # Cache the Dialyzer PLT directory separately from `_build`: the PLT is
      # expensive to rebuild (depends on every transitive app) and changes
      # only when Elixir/OTP or the dependency graph changes.
      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        with:
          path: .dialyzer
          key: ${{ runner.os }}-dialyzer-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: Run tests
        run: mix test

      - name: Build Dialyzer PLTs
        run: mix dialyzer --plt

      - name: Dialyzer
        run: mix dialyzer --format github

      - name: Compile Cure standard library
        run: mix cure.compile_stdlib

      - name: Cure stdlib regression check
        run: mix cure.check.stdlib

      - name: Cure examples regression check
        run: mix cure.check.examples

      - name: Cure regression checks (umbrella)
        run: mix cure.check
